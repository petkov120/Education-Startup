<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Openxp - Set new password</title>
    <!-- Tailwind CDN (GLOBAL) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../styles/typography.css" />
    <style>
      body {
        font-family: "Open Sans", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Arial, sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F5F7FB]">
    <section class="min-h-screen flex flex-col items-center justify-center px-8 py-12">
      <!-- Logo -->
      <div class="w-full max-w-md mb-8">
        <a href="/index.html">
          <img src="/Images/purple.png" alt="Openxp Logo" class="h-auto w-30" />
        </a>
      </div>

      <!-- Main Content + Loader wrapper -->
      <div class="w-full max-w-md relative">
        <!-- Loader aligned with card width (third step active) -->
        <div class="flex gap-1 w-full mb-6">
          <div class="h-1 bg-gray-300 flex-1"></div>
          <div class="h-1 bg-gray-300 flex-1"></div>
          <div class="h-1 bg-[#2B0A6B] flex-1"></div>
        </div>

        <!-- Card -->
        <div class="flex flex-col gap-6 bg-white rounded-lg shadow-sm px-8 py-10">
          <div class="text-center space-y-2">
            <h1 class="text-black h1">Set new Password</h1>
            <p class="text-black body-md">
              make sure it is at least 8 characters and one special symbol
            </p>
          </div>

          <!-- Form -->
          <form id="reset-password-form" class="flex flex-col gap-6 mt-4">
            <!-- New password -->
            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-800">New Password</label>
              <div class="relative w-full h-11">
                <input
                  id="new-password"
                  type="password"
                  placeholder="********"
                  class="w-full h-full px-4 pr-12 border bg-white border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2B0A6B]"
                />
                <button
                  type="button"
                  class="absolute right-3 top-0 bottom-0 flex items-center text-gray-500 hover:text-gray-700"
                  aria-label="Toggle password visibility"
                >
                  <!-- eye icon -->
                  <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path
                      d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"
                      stroke="currentColor"
                      stroke-width="2"
                    />
                    <path
                      d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                      stroke="currentColor"
                      stroke-width="2"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Confirm new password -->
            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-800">Confirm new password</label>
              <div class="relative w-full h-11">
                <input
                  id="confirm-password"
                  type="password"
                  placeholder="********"
                  class="w-full h-full px-4 pr-12 border bg-white border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2B0A6B]"
                />
                <button
                  type="button"
                  class="absolute right-3 top-0 bottom-0 flex items-center text-gray-500 hover:text-gray-700"
                  aria-label="Toggle password visibility"
                >
                  <!-- eye icon -->
                  <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path
                      d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"
                      stroke="currentColor"
                      stroke-width="2"
                    />
                    <path
                      d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                      stroke="currentColor"
                      stroke-width="2"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <button
              type="submit"
              class="w-full bg-[#2B0A6B] text-white px-4 py-3 rounded-md hover:bg-[#3C127F] transition"
            >
              Reset password
            </button>
          </form>
          <div
            id="reset-password-message"
            role="alert"
            class="mt-2 text-sm px-3 py-2 rounded-md hidden"
            aria-live="polite"
          ></div>

          <!-- Back to login -->
          <a
            href="login.html"
            class="mt-2 flex items-center gap-2 text-sm font-medium text-gray-700 hover:text-[#2B0A6B] transition"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 19l-7-7 7-7"
              />
            </svg>
            <span>Back to login</span>
          </a>
        </div>
      </div>
    </section>

    <!-- Supabase config (gitignored, local only) -->
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // #region agent log
      const __agentLog = (hypothesisId, location, message, data) => {
        fetch('http://127.0.0.1:7765/ingest/2214c16a-58fe-412d-ae58-b5cd0a5eea9b',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'22c306'},body:JSON.stringify({sessionId:'22c306',runId:'pre-fix',hypothesisId,location,message,data,timestamp:Date.now()})}).catch(()=>{});
      };
      // #endregion

      /**
       * Hypotheses:
       * H1: Reset page is not wired (no submit handler / no Supabase calls).
       * H2: Supabase config is missing on this page (SUPABASE_URL / SUPABASE_ANON_KEY undefined).
       * H3: User lands here without a valid recovery session (bad redirect URL or missing tokens).
       * H4: Form values are invalid/mismatched (frontend validation missing).
       */

      const msgEl = document.getElementById("reset-password-message");
      const form = document.getElementById("reset-password-form");
      const newPwdEl = document.getElementById("new-password");
      const confirmPwdEl = document.getElementById("confirm-password");

      function showMsg(kind, text) {
        if (!msgEl) return;
        msgEl.textContent = text;
        msgEl.className = "mt-2 text-sm px-3 py-2 rounded-md border";
        if (kind === "error") {
          msgEl.classList.add("bg-red-50", "border-red-200", "text-red-700");
        } else {
          msgEl.classList.add("bg-green-50", "border-green-200", "text-green-700");
        }
      }

      function hasRecoveryInfo() {
        const hash = window.location.hash || "";
        const search = window.location.search || "";
        // Don't log tokens. Only log presence of markers.
        return {
          hasHash: Boolean(hash),
          hasAccessTokenInHash: /access_token=/.test(hash),
          hasRefreshTokenInHash: /refresh_token=/.test(hash),
          hasTypeRecoveryInHash: /type=recovery/.test(hash),
          hasCodeInSearch: /[?&]code=/.test(search),
          hasTypeRecoveryInSearch: /[?&]type=recovery/.test(search),
        };
      }

      window.addEventListener("load", async () => {
        __agentLog("H1", "resetpassword.html:boot", "reset page loaded", {
          pathname: window.location.pathname,
          origin: window.location.origin,
          recoveryMarkers: hasRecoveryInfo(),
        });

        const cfgMissing = (typeof SUPABASE_URL === "undefined" || typeof SUPABASE_ANON_KEY === "undefined");
        __agentLog("H2", "resetpassword.html:cfg", "supabase config presence", {
          hasUrl: typeof SUPABASE_URL !== "undefined",
          hasAnonKey: typeof SUPABASE_ANON_KEY !== "undefined",
          supabaseLibLoaded: typeof window.supabase !== "undefined",
          cfgMissing,
        });

        if (!cfgMissing && typeof window.supabase !== "undefined") {
          try {
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const { data, error } = await supabaseClient.auth.getSession();
            __agentLog("H3", "resetpassword.html:session", "supabase getSession result", {
              hasSession: Boolean(data && data.session),
              hasUser: Boolean(data && data.session && data.session.user),
              error: error ? (error.message || String(error)) : null,
            });
          } catch (e) {
            __agentLog("H3", "resetpassword.html:session-catch", "supabase getSession threw", {
              error: e && (e.message || String(e)),
            });
          }
        }
      });

      if (form) {
        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const pwd = (newPwdEl?.value || "");
          const confirm = (confirmPwdEl?.value || "");

          __agentLog("H4", "resetpassword.html:submit", "reset submit attempt", {
            pwdLen: pwd.length,
            confirmLen: confirm.length,
            match: pwd === confirm,
          });

          if (!pwd || !confirm) {
            showMsg("error", "Please fill in both password fields.");
            return;
          }
          if (pwd !== confirm) {
            showMsg("error", "Passwords do not match.");
            return;
          }
          if (pwd.length < 8) {
            showMsg("error", "Password must be at least 8 characters.");
            return;
          }

          const cfgMissing = (typeof SUPABASE_URL === "undefined" || typeof SUPABASE_ANON_KEY === "undefined" || typeof window.supabase === "undefined");
          if (cfgMissing) {
            showMsg("error", "Reset page is missing Supabase config. Check config.js loading.");
            return;
          }

          // NOTE: We are only instrumenting the runtime right now.
          // Actual password update will be implemented after we confirm recovery session state in logs.
          showMsg("error", "Debug mode: captured logs. Next step is enabling the actual update call.");
        });
      } else {
        __agentLog("H1", "resetpassword.html:form-missing", "reset form not found", {});
      }
    </script>
  </body>
</html>
