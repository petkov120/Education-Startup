<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Openxp - Forgot Password</title>
    <!-- Tailwind CDN (GLOBAL) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../styles/typography.css" />
    <style>
      body {
        font-family: "Open Sans", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Arial, sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F5F7FB]">
    <section class="min-h-screen flex flex-col items-center justify-center px-8 py-12">
      <!-- Logo -->
      <div class="w-full max-w-md mb-8">
        <a href="/index.html">
          <img src="/Images/purple.png" alt="Openxp Logo" class="h-auto w-30" />
        </a>
      </div>

      <!-- Main Content + Loader wrapper -->
      <div class="w-full max-w-md relative">
        <!-- Loader aligned with form width at top of card -->
        <div class="flex gap-1 w-full mb-6">
          <div class="h-1 bg-[#2B0A6B] flex-1"></div>
          <div class="h-1 bg-gray-300 flex-1"></div>
          <div class="h-1 bg-gray-300 flex-1"></div>
        </div>

        <!-- Form container -->
        <div class="flex flex-col gap-6">
          <h1 class="text-black h1 text-center">Forgot Password</h1>
          <p class="text-black body-md text-center">
            No worries, we'll send you reset instructions
          </p>

          <form id="reset-form" class="flex flex-col gap-6 mt-6">
            <input
              id="email"
              type="email"
              placeholder="Email Address"
              class="w-full px-4 py-3 border bg-white border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#2B0A6B]"
            />

            <button
              id="reset-btn"
              type="submit"
              class="w-full bg-[#2B0A6B] text-white px-4 py-3 rounded-md hover:bg-[#3C127F] transition"
            >
              Reset password
            </button>
          </form>
          <div id="reset-message" role="alert" class="mt-2 text-sm px-3 py-2 rounded-md hidden" aria-live="polite"></div>

          <a
            href="login.html"
            class="flex items-center gap-2 text-sm font-medium text-gray-700 hover:text-[#2B0A6B] transition"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 19l-7-7 7-7"
              />
            </svg>
            <span>Back to login</span>
          </a>
        </div>
      </div>
    </section>

    <!-- Supabase config (gitignored, local only) -->
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>

      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const resetBtn = document.getElementById('reset-btn');
      const msgEl = document.getElementById('reset-message');

      function showError(msg) {
        msgEl.textContent = msg;
        msgEl.className = 'mt-2 text-sm px-3 py-2 rounded-md bg-red-50 border border-red-200 text-red-700';
      }

      function showSuccess(msg) {
        msgEl.textContent = msg;
        msgEl.className = 'mt-2 text-sm px-3 py-2 rounded-md bg-green-50 border border-green-200 text-green-700';
      }

      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        msgEl.className = 'mt-2 text-sm px-3 py-2 rounded-md hidden';

        if (!email) {
          showError('Please enter your email address.');
          return;
        }

        resetBtn.disabled = true;
        resetBtn.textContent = 'Sending…';

        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/Frontend/components/onboarding/login.html'
        });

        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset password';

        if (error) {
          showError(error.message || 'Something went wrong. Please try again.');
          return;
        }

        showSuccess('Reset link sent! Check your email inbox (and spam folder).');
      });
    </script>
  </body>
</html>
